# LiveTalking 本地部署配置
# 复制此文件为 livetalking.conf 并根据实际情况修改

# ==================== 基础配置 ====================
# 项目根目录
PROJECT_ROOT="/opt/2026/LiveTalking"

# Python 虚拟环境路径
VENV_PATH="$PROJECT_ROOT/.venv"

# Python 可执行文件路径
PYTHON_BIN="$VENV_PATH/bin/python"

# 日志目录
LOG_DIR="$PROJECT_ROOT/logs"
PID_FILE="$PROJECT_ROOT/livetalking.pid"

# ==================== 服务配置 ====================
# 监听端口
LISTEN_PORT=8010

# 模型类型 (wav2lip/musetalk/ultralight)
MODEL_TYPE="wav2lip"

# 形象ID
AVATAR_ID="wav2lip256_avatar1"

# 最大并发会话数
MAX_SESSION=1

# ==================== TTS 配置 ====================
# TTS 服务类型 (edgetts/doubao/tencent/azure/gpt-sovits/xtts/cosyvoice/fishtts/indextts2)
TTS_TYPE="doubao"

# 豆包 TTS 配置
DOUBAO_VOICE_ID="zh_female_xiaohe_uranus_bigtts"
DOUBAO_API_KEY=""
DOUBAO_APP_ID=""

# 腾讯 TTS 配置
TENCENT_VOICE_TYPE="1001"
TENCENT_SECRET_ID=""
TENCENT_SECRET_KEY=""

# Azure TTS 配置
AZURE_VOICE_NAME="zh-CN-XiaoxiaoNeural"
AZURE_API_KEY=""
AZURE_REGION="eastasia"

# Edge TTS 配置
EDGE_TTS_VOICE="zh-CN-XiaoxiaoNeural"

# GPT-SoVITS 配置
GPT_SOVITS_API_URL="http://127.0.0.1:9880"

# ==================== ASR 配置 ====================
# ASR 服务类型 (lip/tencent/funasr/huber)
ASR_TYPE="lip"

# 腾讯 ASR 配置
TENCENT_ASR_APP_ID=""
TENCENT_ASR_SECRET_ID=""
TENCENT_ASR_SECRET_KEY=""

# ==================== LLM 配置 ====================
# LLM API 配置 (可选)
LLM_API_BASE=""
LLM_API_KEY=""
LLM_API_MODEL=""

# ==================== WebRTC 配置 ====================
# 视频码率 (kbps)
VIDEO_BITRATE=5000

# 视频编解码器 (auto/H264/VP8/VP9)
VIDEO_CODEC="auto"

# ==================== 服务账户配置 ====================
# 运行服务的用户 (留空表示当前用户)
SERVICE_USER=""

# 运行服务的组 (留空表示当前用户组)
SERVICE_GROUP=""
