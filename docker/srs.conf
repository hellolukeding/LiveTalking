# SRS 配置文件
# LiveTalking 流媒体服务器配置

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# RTC 服务器配置 (WebRTC)
rtc_server {
    enabled on;
    listen 8000;
    candidate $CANDIDATE;
}

# RTMP 配置
vhost __defaultVhost__ {
    hls {
        enabled         on;
    }
    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
    rtc {
        enabled on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }
}
