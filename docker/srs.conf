# SRS 配置文件
# LiveTalking 流媒体服务器配置

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
http_api {
    enabled         on;
    listen          1985;
}
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}
stats {
    network         0;
    disk            off;
}

# RTC 配置 (WebRTC)
http_remux {
    enabled on;
    mount /rtc;
}

rtc {
    enabled on;
    listen 8000; # WebRTC UDP 端口

    # RTC STUN configuration
    stun_enabled on;
    stun_listen 10080;

    # RTC candidates
    candidate eth0;
    candidate 198.18.0.100;

    # RTC session timeout
    session_timeout 60;

    # WebRTC API
    rtc2rtc enabled on;
}

# RTMP 配置
vhost __defaultVhost__ {
    dvr {
        enabled         off;
    }
    http_remux {
        enabled on;
        mount /rtc;
    }
    rtc {
        enabled on;
        # WebRTC 推流和拉流
        rtc2rtmp on;
        rtmp_to_rtc on;
    }
    stream_caster {
        enabled off;
    }
}

# RTC API 配置
http_api {
    enabled on;
    listen 1985;
    # 跨域支持
    crossdomain on;
}
