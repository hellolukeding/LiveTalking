name: Build Windows Installer

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则使用 git tag 或 0.1.0)'
        required: false
        default: ''

  # 推送到 build-windows 分支时触发，或推送 tag 时触发
  push:
    branches:
      - build-windows
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/desktop_app/src-tauri -> target'

      - name: Install dependencies (frontend)
        working-directory: ./frontend/desktop_app
        run: pnpm install

      - name: Build frontend
        working-directory: ./frontend/desktop_app
        run: pnpm run build

      - name: Build Tauri app (Windows)
        working-directory: ./frontend/desktop_app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $env:VERSION = "${{ github.event.inputs.version }}"
            cargo tauri build --version $env:VERSION
          } else {
            cargo tauri build
          }

      - name: Get version
        id: get_version
        shell: powershell
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ($env:GITHUB_REF -match "^refs/tags/v") {
            $version = $env:GITHUB_REF -replace "^refs/tags/v", ""
          } else {
            $version = "0.1.0"
          }
          echo "version=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "Using version: $version"

      - name: Upload Windows installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: livetalking-pc-windows-nsis-${{ env.version }}
          path: frontend/desktop_app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows installer (MSIX)
        uses: actions/upload-artifact@v4
        with:
          name: livetalking-pc-windows-msix-${{ env.version }}
          path: frontend/desktop_app/src-tauri/target/release/bundle/msix/*.msix
          if-no-files-found: warn

      - name: Create Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/desktop_app/src-tauri/target/release/bundle/nsis/*.exe
            frontend/desktop_app/src-tauri/target/release/bundle/msix/*.msix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
