# LiveTalking 前端专用配置文件
# 使用方法: docker-compose -f docker-compose.frontend.yml up -d

services:
  # 前端 Web 服务 (使用本地打包文件)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.local
    image: livetalking-frontend:latest
    container_name: livetalking-frontend
    ports:
      - "8011:80"
    restart: unless-stopped
    networks:
      - livetalking-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  livetalking-network:
    external: true
