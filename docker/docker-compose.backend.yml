# LiveTalking 后端专用配置文件
# 使用方法: docker-compose -f docker-compose.backend.yml up -d

services:
  # LiveTalking 后端服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: livetalking-backend:latest
    container_name: livetalking-backend
    ports:
      - "8081:8010"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../assets:/app/assets:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LISTEN_PORT=8010
      - FPS=25
      - TTS_TYPE=${TTS_TYPE:-edge}
      - ASR_TYPE=${ASR_TYPE:-lip}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - OPEN_AI_URL=${OPEN_AI_URL}
      - OPEN_AI_API_KEY=${OPEN_AI_API_KEY}
      - EDGE_TTS_VOICE=${EDGE_TTS_VOICE:-zh-CN-YunxiNeural}
      - MAX_SESSION=${MAX_SESSION:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - livetalking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  livetalking-network:
    external: true

volumes:
  models:
  data:
  assets:
  logs:
