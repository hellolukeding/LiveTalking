version: "3.8"

services:
  livetalking:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: livetalking
    restart: unless-stopped

    # GPU配置 (需要nvidia-container-runtime)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # 端口映射
    ports:
      - "8011:8011"

    # 文件映射
    volumes:
      # 配置文件
      - ../.env:/app/.env:ro
      # 模型文件（持久化）
      - ../models:/app/models
      # 数据文件（持久化）
      - ../data:/app/data
      # 日志文件
      - ../logs:/app/logs
      # 源代码（可选，用于热更新）
      - ../src:/app/src:ro
      # 前端文件
      - ../frontend:/app/frontend:ro

    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/app
      - TZ=Asia/Shanghai
      - NO_PROMPT=1

    # 资源限制
    mem_limit: 16g
    cpus: 8.0

    # 健康检查
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8011/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 可选：添加Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: livetalking-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      # 将构建后的前端静态文件挂载到 Nginx 默认站点目录
      - ../frontend/desktop_app/dist:/usr/share/nginx/html:ro
    depends_on:
      - livetalking
    environment:
      - TZ=Asia/Shanghai

  # 可选：添加Redis用于会话管理
  redis:
    image: redis:7-alpine
    container_name: livetalking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - TZ=Asia/Shanghai

volumes:
  redis_data:
