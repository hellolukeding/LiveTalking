services:
  # SRS 流媒体服务器
  srs:
    image: ossrs/srs:6
    container_name: livetalking-srs
    ports:
      - "1935:1935"   # RTMP
      - "1985:1985"   # HTTP API
      - "8080:8080"   # SRS Console
      - "8000:8000"   # WebRTC
      - "10080:10080" # WebRTC UDP
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
    command: /usr/local/srs/bin/srs -c /usr/local/srs/conf/srs.conf
    restart: unless-stopped
    networks:
      - livetalking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1985/api/v1/summaries"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # LiveTalking 后端服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: livetalking-backend
    ports:
      - "8010:8010"
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../assets:/app/assets:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LISTEN_PORT=8010
      - FPS=25
      - TTS_TYPE=${TTS_TYPE:-edge}
      - ASR_TYPE=${ASR_TYPE:-lip}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - OPEN_AI_URL=${OPEN_AI_URL}
      - OPEN_AI_API_KEY=${OPEN_AI_API_KEY}
      - EDGE_TTS_VOICE=${EDGE_TTS_VOICE:-zh-CN-YunxiNeural}
      - MAX_SESSION=${MAX_SESSION:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - livetalking-network
    depends_on:
      srs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端 Web 服务 (使用本地打包文件)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.local
    container_name: livetalking-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - livetalking-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: livetalking-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - livetalking-network
    depends_on:
      - backend
      - frontend
    profiles:
      - with-nginx

networks:
  livetalking-network:
    driver: bridge

volumes:
  models:
  data:
  assets:
  logs:
